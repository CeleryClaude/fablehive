# fly.toml app configuration file for fablehive
#
app = 'fablehive'
primary_region = 'syd'

[build]

[http_service]
internal_port = 8081
force_https = true
auto_stop_machines = 'stop'
auto_start_machines = true
min_machines_running = 0
processes = ['app']

[[vm]]
memory_mb = 512
cpu_kind = 'shared'
cpus = 1
