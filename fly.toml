# fly.toml app configuration file for fablehive
#
app = 'fablehive'
primary_region = 'syd'

[build]

[http_service]
internal_port = 8081
force_https = true
auto_stop_machines = 'stop'
auto_start_machines = true
min_machines_running = 1
processes = ['app']

[[vm]]
memory_mb = 2048
cpu_kind = 'performance'
cpus = 1
